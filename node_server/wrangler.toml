name = "cy-gallery"
pages_build_output_dir = "../"
compatibility_date = "2024-02-23"

# Bindings for R2 Bucket
[[r2_buckets]]
binding = "MY_BUCKET"
bucket_name = "gallery"

# Environment variables
[vars]
R2_PUBLIC_DOMAIN = "photos.cycypher.org"
R2_BUCKET_NAME = "gallery"
CLOUDFLARE_ACCOUNT_ID = "154279dfe629beb5bb3ca8475c03049d"
# UPLOAD_PASSCODE, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY should be set via `wrangler secret put` in production
