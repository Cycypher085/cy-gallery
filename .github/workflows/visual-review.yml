name: Visual Review CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # CI 环境使用本地 preview server
  PREVIEW_PORT: 4321

jobs:
  test:
    name: Playwright Tests + Visual Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build preview
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start preview server
        run: npm run preview -- --host 0.0.0.0 --port ${{ env.PREVIEW_PORT }} &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: npx wait-on http://localhost:${{ env.PREVIEW_PORT }} --timeout 30000

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          PREVIEW_URL: http://localhost:${{ env.PREVIEW_PORT }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: test-results/**/*.png
          retention-days: 14

      - name: Generate Review Summary
        if: always()
        run: |
          echo "## 📊 Global Frame Visual Review Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 读取 JSON 报告
          if [ -f playwright-report/results.json ]; then
            PASSED=$(cat playwright-report/results.json | grep -o '"passed":[^,}]*' | head -1 | grep -o '[0-9]*')
            FAILED=$(cat playwright-report/results.json | grep -o '"failed":[^,}]*' | head -1 | grep -o '[0-9]*')
            
            echo "**自动化测试结果:**" >> $GITHUB_STEP_SUMMARY
            echo "✅ Passed: \`${PASSED:-0}\`" >> $GITHUB_STEP_SUMMARY
            echo "❌ Failed: \`${FAILED:-0}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "${FAILED:-0}" != "0" ]; then
              echo "⚠️ 有测试失败，请查看 Artifacts 中的截图了解详情" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "## 🎨 视觉效果反馈（请润清填写）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请查看测试截图后，回复你的评分：" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 维度 | 评分 (1-10) | 备注 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 功能性 | /10 | 按钮/链接/Filter 是否正常 |" >> $GITHUB_STEP_SUMMARY
          echo "| 性能 | /10 | 加载速度/动画流畅度 |" >> $GITHUB_STEP_SUMMARY
          echo "| 视觉效果 | /10 | 背景/粒子/渐变是否符合预期 |" >> $GITHUB_STEP_SUMMARY
          echo "| 可访问性 | /10 | 键盘导航/清晰度 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**回复示例：**" >> $GITHUB_STEP_SUMMARY
          echo "\`功能 8，性能 7，视觉 5（粒子效果太简单），可访问 8\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "我会根据你的反馈继续优化 🚀" >> $GITHUB_STEP_SUMMARY

      - name: Notify via GitHub API
        if: always()
        run: |
          # 构建通知消息
          FAILED_TESTS=""
          if [ -f playwright-report/results.json ]; then
            FAILED=$(cat playwright-report/results.json | grep -o '"failed":[^,}]*' | head -1 | grep -o '[0-9]*')
            if [ "${FAILED:-0}" != "0" ]; then
              FAILED_TESTS="⚠️ ${FAILED} 个测试失败，请查看 Artifacts"
            fi
          fi
          
          echo "CI_NOTIFICATION_FAILED_TESTS=${FAILED_TESTS}" >> $GITHUB_ENV

  # 独立的视觉反馈收集 job
  feedback:
    name: 需要视觉反馈
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Generate feedback request
        run: |
          echo "## 🎨 Global Frame - 视觉评估请求" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CI 测试已完成，请查看上方测试结果和截图。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**请在下方回复你的评分（1-10）：**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **功能性** - 按钮/链接/Filter/地图是否正常工作" >> $GITHUB_STEP_SUMMARY
          echo "2. **性能** - 页面加载速度、动画流畅度" >> $GITHUB_STEP_SUMMARY  
          echo "3. **视觉效果** - 背景粒子/极光/渐变是否符合你的预期" >> $GITHUB_STEP_SUMMARY
          echo "4. **可访问性** - 键盘导航、清晰度" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "直接回复如：\`功能 8，性能 7，视觉 5，可访问 8\`" >> $GITHUB_STEP_SUMMARY
